<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Ticket - SupportDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">Support<span style="color: #1a1a2e;">Desk</span></a>
      <a href="/create" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Ticket
      </a>
    </div>
  </nav>

  <!-- main content -->
  <main class="page-enter" style="padding-top: 88px; padding-bottom: 40px;">
    <div style="max-width: 640px; margin: 0 auto; padding: 0 24px;">

      <!-- back link -->
      <a href="/" class="back-link animate-in">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to tickets
      </a>

      <!-- form card -->
      <div class="card animate-in stagger-1" style="padding: 32px;">
        <h1 style="font-size: 22px; font-weight: 600; margin-bottom: 6px;">Create a new ticket</h1>
        <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 28px;">Fill in the details below and we'll get on it.</p>

        <!-- error display -->
        <div id="form-error" style="display: none; padding: 12px 16px; border-radius: var(--radius-sm); background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; font-size: 14px; margin-bottom: 20px;"></div>

        <form id="ticket-form" autocomplete="off">
          <div style="margin-bottom: 20px;">
            <label class="form-label" for="name">Customer Name</label>
            <input type="text" id="name" class="input-field" placeholder="Full Name">
          </div>

          <div style="margin-bottom: 20px;">
            <label class="form-label" for="email">Customer Email</label>
            <input type="email" id="email" class="input-field" placeholder="email">
          </div>

          <div style="margin-bottom: 20px;">
            <label class="form-label" for="subject">Subject</label>
            <input type="text" id="subject" class="input-field" placeholder="Brief description of the issue">
          </div>

          <div style="margin-bottom: 28px;">
            <label class="form-label" for="desc">Description</label>
            <textarea id="desc" class="input-field" rows="4" placeholder="Explain the issue in more detail..."></textarea>
          </div>

          <button type="submit" id="submit-btn" class="btn-primary" style="width: 100%; padding: 12px 24px; font-size: 15px;">
            Create Ticket
          </button>
        </form>
      </div>

    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/create.js"></script>
</body>
</html>
