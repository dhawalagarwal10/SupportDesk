<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Detail - SupportDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">Support<span style="color: #1a1a2e;">Desk</span></a>
      <a href="/create" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Ticket
      </a>
    </div>
  </nav>

  <!-- main content -->
  <main class="page-enter" style="padding-top: 88px; padding-bottom: 40px;">
    <div style="max-width: 740px; margin: 0 auto; padding: 0 24px;">

      <!-- back link -->
      <a href="/" class="back-link animate-in">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to tickets
      </a>

      <!-- loading state -->
      <div id="loading">
        <div class="card" style="padding: 32px; margin-bottom: 16px;">
          <div class="skeleton" style="height: 16px; width: 100px; margin-bottom: 14px;"></div>
          <div class="skeleton" style="height: 22px; width: 320px; margin-bottom: 12px;"></div>
          <div class="skeleton" style="height: 14px; width: 200px; margin-bottom: 20px;"></div>
          <div class="skeleton" style="height: 14px; width: 100%; margin-bottom: 8px;"></div>
          <div class="skeleton" style="height: 14px; width: 80%;"></div>
        </div>
      </div>

      <!-- 404 state -->
      <div id="not-found" style="display: none;" class="empty-state animate-in">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p style="font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px;">Ticket not found</p>
        <p style="font-size: 14px;">The ticket you're looking for doesn't exist or was removed.</p>
        <a href="/" class="btn-secondary" style="margin-top: 20px;">Go back home</a>
      </div>

      <!-- ticket detail (hidden until loaded) -->
      <div id="detail" style="display: none;">

        <!-- ticket info card -->
        <div class="card animate-in stagger-1" style="padding: 32px; margin-bottom: 16px;">
          <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
            <span id="t-id" style="font-size: 13px; font-weight: 600; color: var(--text-muted);"></span>
            <span id="t-status" class="status-badge"></span>
          </div>

          <h1 id="t-subject" style="font-size: 22px; font-weight: 600; margin-bottom: 16px;"></h1>

          <div style="display: flex; gap: 32px; flex-wrap: wrap; margin-bottom: 20px;">
            <div>
              <p class="detail-label">Customer</p>
              <p id="t-name" style="font-size: 15px; font-weight: 500;"></p>
            </div>
            <div>
              <p class="detail-label">Email</p>
              <p id="t-email" style="font-size: 15px; color: var(--accent);"></p>
            </div>
          </div>

          <div style="margin-bottom: 20px;">
            <p class="detail-label">Description</p>
            <p id="t-desc" style="font-size: 14px; color: var(--text-secondary); line-height: 1.7; white-space: pre-wrap;"></p>
          </div>

          <div style="display: flex; gap: 24px; flex-wrap: wrap; font-size: 13px; color: var(--text-muted);">
            <span>Created: <span id="t-created"></span></span>
            <span>Updated: <span id="t-updated"></span></span>
          </div>
        </div>

        <!-- actions card -->
        <div class="card animate-in stagger-2" style="padding: 24px; margin-bottom: 16px;">
          <h2 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">Update Status</h2>
          <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
            <select id="status-select" class="select-field" style="flex: 1; min-width: 160px;">
              <option value="Open">Open</option>
              <option value="In Progress">In Progress</option>
              <option value="Closed">Closed</option>
            </select>
            <button id="status-btn" class="btn-primary">Update Status</button>
          </div>
        </div>

        <!-- notes section -->
        <div class="card animate-in stagger-3" style="padding: 24px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
            <h2 style="font-size: 16px; font-weight: 600;">Notes</h2>
            <span id="notes-count" style="font-size: 13px; color: var(--text-muted);"></span>
          </div>

          <div id="notes-list" style="margin-bottom: 20px;">
            <!-- notes rendered here -->
          </div>

          <!-- add note form -->
          <div style="border-top: 1px solid var(--border-color); padding-top: 20px;">
            <textarea id="note-input" class="input-field" rows="3" placeholder="Add a note..."></textarea>
            <button id="note-btn" class="btn-primary" style="margin-top: 12px;">Add Note</button>
          </div>
        </div>

      </div>

    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/detail.js"></script>
</body>
</html>
