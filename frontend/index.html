<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SupportDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">Support<span style="color: #1a1a2e;">Desk</span></a>
      <a href="/create" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Ticket
      </a>
    </div>
  </nav>

  <!-- main content -->
  <main class="page-enter" style="padding-top: 88px; padding-bottom: 40px;">
    <div style="max-width: 900px; margin: 0 auto; padding: 0 24px;">

      <!-- header -->
      <div class="animate-in" style="margin-bottom: 28px;">
        <h1 style="font-size: 26px; font-weight: 600; color: var(--text-primary);">Support Tickets</h1>
        <p id="subtitle" style="font-size: 14px; color: var(--text-muted); margin-top: 4px;">Loading tickets...</p>
      </div>

      <!-- toolbar -->
      <div class="toolbar-row animate-in stagger-1" style="display: flex; gap: 12px; margin-bottom: 24px; align-items: center;">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search" class="input-field" placeholder="Search tickets by name, subject...">
        </div>
        <select id="filter" class="select-field">
          <option value="">All Status</option>
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>
      </div>

      <!-- ticket list -->
      <div id="ticket-list">
        <!-- loading skeletons shown by js -->
      </div>

      <!-- empty state (hidden by default) -->
      <div id="empty-state" style="display: none;" class="empty-state animate-in">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="18" rx="3"/>
          <line x1="8" y1="9" x2="16" y2="9"/>
          <line x1="8" y1="13" x2="13" y2="13"/>
        </svg>
        <p style="font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px;">No tickets found</p>
        <p style="font-size: 14px;">Create your first one to get started!</p>
      </div>

    </div>
  </main>



  <script src="/js/api.js"></script>
  <script src="/js/tickets.js"></script>
</body>
</html>
